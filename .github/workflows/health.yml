name: Repository Health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    name: Green check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate README exists
        run: test -f README.md

      - name: Report status
        run: echo "Showcase repository health checks passed."
